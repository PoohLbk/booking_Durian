<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ระบบบันทึกลูกค้าเข้าพัก</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/parallax/jsPDF@master/examples/fonts/THSarabun-normal.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #74ebd5, #ACB6E5);
      margin: 0;
      padding: 0;
    }

    .promo-banner {
      width: 50%;
      aspect-ratio: 120 / 50;
      overflow: hidden;
    }

    .slides {
      display: flex;
      width: calc(100% * 3);
      height: 100%;
      transition: transform 0.8s ease-in-out;
    }

    .slide {
      width: 100%;
      flex-shrink: 0;
    }

    .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(1.05);   /* ลดจาก 1.2 → 1.05 */
    transition: transform 4s ease;
    }

    .slide.active img {
  transform: scale(1);  /* ซูมออกนิดเดียว */
    }

    .container {
      max-width: 700px;
      margin: 20px auto;
      background: white;
      padding: 25px;
      border-radius: 15px;
    }

    label { display: block; margin-top: 10px; font-weight: bold; }

    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 8px;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 12px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 10px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .gallery img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 10px;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #f1f1f1;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<!-- สไลด์ -->
<div class="promo-banner">
  <div class="slides" id="slides">
    <div class="slide"><img src="ระบบจองห้องพัก/IMG_3473.JPG"></div>
    <div class="slide"><img src="ระบบจองห้องพัก/IMG_3475 2.JPG"></div>
    <div class="slide"><img src="ระบบจองห้องพัก/d1b2ed68563cc7ac65bea4f716d5ffba.JPEG"></div>
  </div>
</div>

<div class="container">

<h2>🏕️ ระบบบันทึกลูกค้าเข้าพัก</h2>

<!-- Gallery -->
<div class="gallery">
  <img src="ระบบจองห้องพัก/สีดำ สีขาว เรียบง่าย สนุกสนาน มินิมอล ห้องพัก Facebook post.zip - 3.PNG">
  <img src="ระบบจองห้องพัก/สีดำ สีขาว เรียบง่าย สนุกสนาน มินิมอล ห้องพัก Facebook post.PNG">
  <img src="ระบบจองห้องพัก/สีดำ สีขาว เรียบง่าย สนุกสนาน มินิมอล ห้องพัก Facebook post.zip - 1.PNG">
  <img src="ระบบจองห้องพัก/สีดำ สีขาว เรียบง่าย สนุกสนาน มินิมอล ห้องพัก Facebook post.png.PNG">
</div>

<label>ชื่อ</label>
<input type="text" id="name">

<label>เบอร์โทร</label>
<input type="text" id="phone">

<label>ประเภทห้องพัก</label>
<select id="room">
  <option value="1500">บ้านญี่ปุ่น</option>
  <option value="3000">บ้านญี่ปุ่น 2หลัง</option>
  <option value="2500">บ้านโมเดิร์น</option>
  <option value="5000">บ้านโมเดิร์น 2หลัง</option>
  <option value="2500">กระโจมริมน้ำ</option>
  <option value="1000">เต้นท์</option>
  <option value="2000">เต้นท์2หลัง</option>
  <option value="0">กางเต้นท์</option>
</select>

<label>จำนวนคนเสริม</label>
<input type="number" id="extra" value="0">

<label>ประเภทวัน</label>
<select id="dayType">
  <option value="normal">วันปกติ (-300)</option>
  <option value="holiday">วันหยุด</option>
</select>

<label>การชำระเงิน</label>
<select id="payment">
  <option value="full">จ่ายเต็ม</option>
  <option value="deposit">มัดจำ 50%</option>
</select>

<button onclick="calculate()">💰 คำนวณราคา</button>

<div class="result" id="result"></div>

<div style="text-align:center; margin-top:15px;">
  <img id="qr" style="display:none; width:200px;">
</div>

</div>

<script>

// สไลด์
let index = 0;
const slides = document.getElementById("slides");
const totalSlides = document.querySelectorAll('.slide').length;

setInterval(() => {
  index = (index + 1) % totalSlides;
  slides.style.transform = `translateX(-${index * 100}%)`;
}, 4000);

let lastData = {};

function calculate(){

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;

  const roomSelect = document.getElementById("room");
  const roomName = roomSelect.options[roomSelect.selectedIndex].text;
  let roomPrice = parseInt(roomSelect.value);

  const extra = parseInt(document.getElementById("extra").value);
  const dayType = document.getElementById("dayType").value;
  const payment = document.getElementById("payment").value;

  if(dayType==="normal") roomPrice -= 300;

  const total = roomPrice + (extra * 300);
  const pay = payment==="deposit" ? total * 0.5 : total;

  document.getElementById("result").innerHTML = `
    ชื่อ: ${name}<br>
    ห้อง: ${roomName}<br>
    คนเสริม: ${extra}<br>
    รวม: ${total}<br>
    ต้องจ่าย: ${pay}
  `;

  
  document.getElementById("qr").src = "https://raw.githubusercontent.com/PoohLbk/booking_Durian/refs/heads/main/IMG_3102.PNG";
  document.getElementById("qr").style.display = "block";

  lastData = {name, phone, roomName, extra, total, pay};
}


</script>

</body>
</html>
